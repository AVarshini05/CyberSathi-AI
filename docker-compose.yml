version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ccrms_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ccrms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ccrms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccrms_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/ccrms
      - SECRET_KEY=38b724f8d48416d8a23d6a2f7c0068a159feea6b4c10c0e86b3e70d44084f7b4
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - PROJECT_NAME=CCRMS Backend
    volumes:
      - ./backend:/backend
      - uploads_data:/backend/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ccrms_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
